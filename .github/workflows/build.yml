name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.2.app/Contents/Developer

      - name: Build archive (no signing)
        run: |
          xcodebuild -project ArkManager.xcodeproj \
            -scheme ArkManager \
            -configuration Release \
            -archivePath $PWD/ArkManager.xcarchive \
            -destination 'generic/platform=iOS' \
            -allowProvisioningUpdates \
            CODE_SIGNING_ALLOWED=NO \
            archive 2>&1 | tail -50

      - name: Package IPA (unsigned)
        run: |
          mkdir -p Payload
          cp -r ArkManager.xcarchive/Products/Applications/ArkManager.app Payload/
          zip -r ArkManager.ipa Payload
          rm -rf Payload
          echo "IPA size: $(du -h ArkManager.ipa | cut -f1)"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ArkManager-IPA
          path: ArkManager.ipa
          retention-days: 30
